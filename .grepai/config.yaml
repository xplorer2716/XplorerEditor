version: 1
embedder:
    provider: ollama
    model: nomic-embed-text
    endpoint: http://localhost:11434
    dimensions: 768
    parallelism: 4
store:
    backend: gob
chunking:
    size: 512
    overlap: 50
watch:
    debounce_ms: 500
    last_index_time: 2026-04-04T20:14:06.0619802+02:00
    rpg_persist_interval_ms: 1000
    rpg_derived_debounce_ms: 300
    rpg_full_reconcile_interval_sec: 300
    rpg_max_dirty_files_per_batch: 128
search:
    boost:
        enabled: true
        penalties:
            - pattern: /tests/
              factor: 0.5
            - pattern: /test/
              factor: 0.5
            - pattern: __tests__
              factor: 0.5
            - pattern: _test.
              factor: 0.5
            - pattern: .test.
              factor: 0.5
            - pattern: .spec.
              factor: 0.5
            - pattern: test_
              factor: 0.5
            - pattern: /mocks/
              factor: 0.4
            - pattern: /mock/
              factor: 0.4
            - pattern: .mock.
              factor: 0.4
            - pattern: /fixtures/
              factor: 0.4
            - pattern: /testdata/
              factor: 0.4
            - pattern: /generated/
              factor: 0.4
            - pattern: .generated.
              factor: 0.4
            - pattern: .gen.
              factor: 0.4
            - pattern: .md
              factor: 0.6
            - pattern: /docs/
              factor: 0.6
        bonuses:
            - pattern: /src/
              factor: 1.1
            - pattern: /lib/
              factor: 1.1
            - pattern: /app/
              factor: 1.1
    hybrid:
        enabled: false
        k: 60
trace:
    mode: fast
    enabled_languages:
        - .go
        - .js
        - .ts
        - .jsx
        - .tsx
        - .py
        - .php
        - .lua
        - .c
        - .h
        - .cpp
        - .hpp
        - .cc
        - .cxx
        - .rs
        - .zig
        - .cs
        - .java
        - .fs
        - .fsx
        - .fsi
        - .pas
        - .dpr
    exclude_patterns:
        - '*_test.go'
        - '*.spec.ts'
        - '*.spec.js'
        - '*.test.ts'
        - '*.test.js'
        - __tests__/*
rpg:
    enabled: false
    feature_mode: local
    drift_threshold: 0.35
    max_traversal_depth: 3
    llm_provider: ollama
    llm_endpoint: http://localhost:11434/v1
    llm_timeout_ms: 8000
    feature_group_strategy: sample
update:
    check_on_startup: false
ignore:
    - .git
    - .grepai
    - node_modules
    - vendor
    - bin
    - dist
    - __pycache__
    - .venv
    - venv
    - .idea
    - .vscode
    - target
    - .zig-cache
    - zig-out
    - qdrant_storage
